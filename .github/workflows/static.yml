name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build with Docker Compose and deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure static directory exists
        run: |
          if [ ! -f static/docker-compose.yml ]; then
            echo "No static/docker-compose.yml found in repository. Failing workflow." >&2
            exit 1
          fi

      - name: Build site with Docker Compose
        working-directory: static
        run: docker compose build qa

      - name: Extract built static files from container
        working-directory: static
        run: |
          docker compose create qa
          container_id="$(docker compose ps -a -q qa | head -n 1)"
          mkdir -p ../pages-site
          docker cp "${container_id}:/usr/share/nginx/html/." ../pages-site/
          docker rm -f "${container_id}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
