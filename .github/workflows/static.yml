name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Deploy contents of static/ to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure static directory exists
        run: |
          if [ ! -d static ]; then
            echo "No static/ directory found in repository. Failing workflow." >&2
            exit 1
          fi

      - name: List files to be published (for debug)
        run: |
          echo "Publishing contents of: static/"
          ls -la static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: static

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
